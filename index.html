let currentGame=null;function openGame(g){currentGame=g;$('#mTitle').textContent=`${g.emoji} ${g.id}. ${g.title}`;$('#mBody').innerHTML='';current=()=>{$('#mBody').innerHTML='';(E[g.skill]||E.choice)($('#mBody'),g)};current();$('#modal').classList.add('open');Sound.click()}function drawHome(){let data=[['Math','➗','Practice numbers, fractions, geometry and word problems','#ff6b6b'],['Science','🔬','Explore quizzes and experiment predictions','#06d6a0'],['English','📚','Read, pronounce, spell and build vocabulary','#8b5cf6'],['All','🌟','See every activity in one learning library','#118ab2']];$('#catgrid').innerHTML=data.map(d=>{let count=d[0]==='All'?GAMES.length:catTotal(d[0]),done=d[0]==='All'?Object.keys(score.completed||{}).length:(score.cat?.[d[0]]||0);return `<button class="catcard" style="background:linear-gradient(135deg,${d[3]},${COLORS[rnd(COLORS.length)]})" onclick="selectCat('${d[0]}')"><span class="big">${d[1]}</span><h3>${d[0]}</h3><p>${d[2]}</p><small>${done}/${count} completed</small></button>`}).join('')}function selectCat(c){$('#cat').value=c;renderGrid();window.scrollTo({top:0,behavior:'smooth'})}function renderGrid(){let cat=$('#cat').value,term=$('#search').value.toLowerCase().trim(),grid=$('#grid');let home=cat==='Home'&&!term;$('#home').style.display=home?'block':'none';grid.style.display=home?'none':'grid';if(home){drawHome();return}grid.innerHTML='';GAMES.filter(g=>(cat==='All'||cat==='Home'||g.category===cat)&&(!term||(g.title+' '+g.desc+' '+g.skill+' '+g.category).toLowerCase().includes(term))).forEach(g=>{let done=score.completed?.[g.id]?' ✅':'';let b=document.createElement('button');b.className='tile';b.style.background=`linear-gradient(135deg, ${g.color}, ${COLORS[(g.id+3)%COLORS.length]})`;b.innerHTML=`<span class="badge">${g.category}</span><span class="emoji">${g.emoji}</span><h3>${g.id}. ${g.title}${done}</h3><p>${g.desc}</p>`;b.onclick=()=>openGame(g);grid.appendChild(b)})}$('#closeBtn').onclick=()=>$('#modal').classList.remove('open');$('#modal').onclick=e=>{if(e.target.id==='modal')$('#modal').classList.remove('open')};$$('[data-diff]').forEach(b=>b.onclick=()=>{$$('[data-diff]').forEach(x=>x.classList.remove('active'));b.classList.add('active');DIFF=b.dataset.diff;if(current)current();Sound.click()});$('#cat').onchange=renderGrid;$('#search').oninput=renderGrid;$('#soundToggle').onclick=()=>{let on=!Sound.isOn();Sound.toggle(on);$('#soundToggle').textContent=on?'🔊 Sound: ON':'🔇 Sound: OFF'};$('#resetScore').onclick=()=>{score={played:0,wins:0,losses:0,points:0,best:0,cat:{Math:0,Science:0,English:0},completed:{}};save();renderGrid()};drawScore();drawTracker();drawHome();renderGrid();</script></body></html>
